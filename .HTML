<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Persona Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Talk to Persona: Aditi Sharma</h1>

<div class="persona-card">
<img src="https://i.pravatar.cc/150?img=47" alt="persona">
<div>
<h2>Aditi Sharma</h2>
<p>24 | Software Developer | Pune</p>
</div>
</div>

<div class="chatbox" id="chatbox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask something about the persona...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
